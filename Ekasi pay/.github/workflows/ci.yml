name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --run
      - run: npm run build
      - name: Backend install & checks
        working-directory: backend
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run test
          npm run smoke
        env:
          NODE_ENV: test

  mobile-web-build:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://api.ci.example
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run mobile:build

  mobile-ios-verify:
    runs-on: ubuntu-latest
    needs: mobile-web-build
    env:
      VITE_API_URL: https://api.ci.example
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run mobile:verify:ios

  ops-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Ekasi pay/ops-dashboard/package-lock.json
      - name: Ops dashboard install & checks
        working-directory: Ekasi pay/ops-dashboard
        run: |
          npm ci
          npm run typecheck
          npm run build

name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs on the same ref so PR push storms do not queue stale work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; jobs that need more must declare it explicitly.
permissions:
  contents: read

defaults:
  run:
    working-directory: Ekasi pay

jobs:
  # Reminder only — configure these in the GitHub UI for the default branch / environments:
  # - Branch protection: require PR reviews before merge
  # - Required status checks: this workflow's jobs (validate, secret-scan, etc.)
  # - Deployment environments: staging (and production) with required reviewers / wait timer
  github-controls-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Document external GitHub UI gates
        working-directory: .
        run: |
          {
            echo '## External GitHub controls (configure in UI)'
            echo ''
            echo 'This workflow does not enable branch protection or environment approvals.'
            echo 'Configure in the repository / organization settings:'
            echo ''
            echo '- Protected default branch with required pull-request reviews'
            echo '- Required status checks matching this workflow'
            echo '- Staging (and production) Environments with required reviewers before deploy'
            echo ''
            echo 'See `Ekasi pay/backend/docs/phase8-release.md`.'
          } >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks (checksum-verified)
        working-directory: .
        env:
          GITLEAKS_VERSION: 8.21.2
          # sha256 of gitleaks_8.21.2_linux_x64.tar.gz from GitHub Releases
          GITLEAKS_SHA256: 5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
        run: |
          set -euo pipefail
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}" -o "${ARCHIVE}"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          tar -xzf "${ARCHIVE}" -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan repository for secrets
        working-directory: .
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019 # v4.5.0
        with:
          fail-on-severity: high

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: github/codeql-action/init@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@4187e74d05793876e9989daffde9c3e66b4acd07 # v3

  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Ekasi pay/package-lock.json
            Ekasi pay/backend/package-lock.json
            Ekasi pay/ops-dashboard/package-lock.json
      - name: Generate npm SBOMs
        working-directory: .
        run: |
          set -euo pipefail
          mkdir -p sbom
          (cd "Ekasi pay" && npm ci --omit=dev && npx --yes @cyclonedx/cyclonedx-npm --output-file ../sbom/frontend.cdx.json)
          (cd "Ekasi pay/backend" && npm ci --omit=dev && npx --yes @cyclonedx/cyclonedx-npm --output-file ../../sbom/backend.cdx.json)
          (cd "Ekasi pay/ops-dashboard" && npm ci --omit=dev && npx --yes @cyclonedx/cyclonedx-npm --output-file ../../sbom/ops.cdx.json)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cyclonedx
          path: sbom/*.cdx.json

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ekasi
          POSTGRES_PASSWORD: ekasi
          POSTGRES_DB: ekasi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ekasi -d ekasi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Ekasi pay/package-lock.json
      - run: npm ci
      - name: Frontend production dependency audit
        run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run test -- --run
      - run: npm run build
      - name: Backend install & checks
        working-directory: Ekasi pay/backend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npm run migrate:validate
          npm run lint
          npm run typecheck
          npm run test
          npm run build
          npm run smoke
        env:
          NODE_ENV: test
      - name: Validate PostgreSQL migrations + reconcile + PG tests
        working-directory: Ekasi pay/backend
        run: |
          npm run migrate:up
          npm run migrate:status
          npm run cash-send:backfill-pii
          npm run money:reconcile
          npm run ledger:reconcile
          npm run voucher:reconcile
          npm run test:postgres
        env:
          DATABASE_URL: postgresql://ekasi:ekasi@localhost:5432/ekasi_test
          TEST_DATABASE_URL: postgresql://ekasi:ekasi@localhost:5432/ekasi_test
          PG_INTEGRATION_TESTS: '1'
          NODE_ENV: test
          CASH_SEND_ENABLED: '0'
          LENDING_ENABLED: '0'
          INSURANCE_ENABLED: '0'
          STOKVEL_MONEY_MOVEMENT_ENABLED: '0'
          LIVE_UTILITIES_ENABLED: '0'

  mobile-web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_API_URL: https://api.ci.example
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Ekasi pay/package-lock.json
      - run: npm ci
        working-directory: Ekasi pay
      - run: npm run mobile:build
        working-directory: Ekasi pay

  mobile-ios-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: mobile-web-build
    env:
      VITE_API_URL: https://api.ci.example
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Ekasi pay/package-lock.json
      - run: npm ci
        working-directory: Ekasi pay
      - run: npm run mobile:verify:ios
        working-directory: Ekasi pay

  ops-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Ekasi pay/ops-dashboard/package-lock.json
      - name: Ops dashboard install & checks
        working-directory: Ekasi pay/ops-dashboard
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npm run typecheck
          npm run build
